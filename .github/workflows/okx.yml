name: OKX Coin Alert

on:
  repository_dispatch:
    types: [run-bot]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install axios

      # === BƯỚC 1: KHÔI PHỤC FILE TRẠNG THÁI (CHỐNG TRÙNG) ===
      - name: Restore State Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            state.json
            sentCoins.json
          key: coin-bot-state-${{ github.run_id }}
          restore-keys: |
            coin-bot-state-

      # === BƯỚC 2: CHẠY CÁC SCRIPT (ĐÃ ĐƯỢC CẤP ĐỦ TOKEN) ===
      - name: Run Buy Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node buy.js

      - name: Run Sell Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node sell.js

      # === BƯỚC 3: LƯU LẠI TRẠNG THÁI MỚI CHO LẦN CHẠY SAU ===
      - name: Save State Cache
        if: always() # Luôn chạy kể cả khi script buy/sell có lỗi để không mất dữ liệu chống trùng
        uses: actions/cache/save@v4
        with:
          path: |
            state.json
            sentCoins.json
          key: coin-bot-state-${{ github.run_id }}-${{ github.run_attempts }}
